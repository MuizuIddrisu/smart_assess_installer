<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1e293b;
    color: #fff;
    width: 600px;
    height: 380px;
    overflow: hidden;
    user-select: none;
    display: flex;
    flex-direction: column;
  }

  /* ── Top section: logo + brand ── */
  .top {
    display: flex;
    align-items: center;
    gap: 0;
    flex: 1;
  }

  .logo-panel {
    width: 220px;
    height: 100%;
    background: #1e293b;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 32px;
  }

  .logo-panel img {
    width: 140px;
    height: 140px;
    object-fit: contain;
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }

  .brand-panel {
    flex: 1;
    background: #f1f5f9;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 36px;
  }

  .brand-name {
    font-size: 42px;
    font-weight: 900;
    line-height: 1.05;
    color: #1e293b;
    letter-spacing: -1px;
  }

  .brand-tagline {
    font-size: 13px;
    font-weight: 700;
    color: #0891b2;
    margin-top: 6px;
    letter-spacing: .3px;
    text-transform: uppercase;
  }

  .brand-by {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 24px;
    font-weight: 500;
  }
  .brand-by strong {
    color: #334155;
    font-weight: 800;
  }

  /* ── Bottom bar: status + progress ── */
  .bottom {
    height: 72px;
    background: #0f172a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 24px;
    gap: 8px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #94a3b8;
  }

  .spinner {
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255,255,255,.15);
    border-top-color: #0891b2;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #status-text { color: #cbd5e1; }

  .progress-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #0891b2, #06b6d4);
    border-radius: 2px;
    width: 0%;
    transition: width .4s ease;
    animation: indeterminate 1.6s ease-in-out infinite;
  }
  @keyframes indeterminate {
    0%   { transform: translateX(-100%); width: 40%; }
    50%  { width: 60%; }
    100% { transform: translateX(300%); width: 40%; }
  }
  .progress-bar.done {
    animation: none;
    width: 100%;
    background: #10b981;
  }
</style>
</head>
<body>

<div class="top">
  <div class="logo-panel">
    <img src="../assets/icon_256.png" alt="Smart Assess Logo"
         onerror="this.style.display='none'">
  </div>
  <div class="brand-panel">
    <div class="brand-name">SMART<br>ASSESS</div>
    <div class="brand-tagline">Software for Basic Schools</div>
    <div class="brand-by">Built by <strong>Muizu Code</strong></div>
  </div>
</div>

<div class="bottom">
  <div class="status-row">
    <div class="spinner" id="spinner"></div>
    <span id="status-text">Starting Smart Assess…</span>
    <span style="margin-left:auto;font-size:11px;color:#475569;">v3.1</span>
  </div>
  <div class="progress-track">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
</div>

<script>
  const messages = [
    'Starting Smart Assess…',
    'Loading school data…',
    'Running database checks…',
    'Preparing the server…',
    'Almost ready…',
  ];
  let i = 0;
  const statusEl = document.getElementById('status-text');
  const interval = setInterval(() => {
    i = (i + 1) % messages.length;
    statusEl.textContent = messages[i];
  }, 1800);
</script>

</body>
</html>
